# Don't print a new line at the start of the prompt
add_newline = false
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—
# Cool stuff у°ңҘ о©ұ пҒӢ пҖҚ

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:245'

right_format = """
$c\
$cpp\
$cmake\
$rust\
$haskell\
$java\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$python\
$zig\
"""

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character] # The name of the module we are configuring is "character"
success_symbol = "[  о©ұ пҒӢ](bold fg:blue)"
error_symbol = "[  пҖҚ пҒӢ](bold fg:red)"

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: 252"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:252)[$symbol $branch(:$remote_branch)](fg:235 bg:252)[оӮҙ ](bold fg:252)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format = "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:252 fg:235"
style_root = "red bold"
format = "[оӮ¶](bold fg:252)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:255 fg:black"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:255)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:255)'


[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:yellow)[у°Әў $duration](bold bg:yellow fg:black)[оӮҙ](bold fg:yellow)'

[c]
format = " [$symbol($version(-$name))]($style)"
symbol = "в„Ӯ "

[cpp]
disabled = false
commands = [['clang++', '--version'], ['g++', '--version']]
format = ' [cpp](italic) [$name $version]($style)'
style = "bold blue"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
style = "bold red"
symbol = "оҡӢ "
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
style = "bold bright-yellow"
symbol = "вЁҖ "
version_format = "${raw}"

[nodejs]
detect_extensions = []
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
format = "[пўҳ ](bold bright-green)"
version_format = "${raw}"


[python]
format = "[${symbol}(${virtualenv}) ${version}]($style)"
style = "bold bright-yellow"
symbol = "[оҙӣ ](bold bright-blue)"
version_format = "${raw}"

[haskell]
format = " hs [$symbol($version )]($style)"
symbol = "вқҜО» "

[java]
format = " java [${symbol}(${version} )]($style)"
symbol = "оҷӯ "

[zig]
format = " zig [$symbol]($style)"
symbol = "оҡ© "
